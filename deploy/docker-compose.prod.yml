# Production stack for ONE client (isolated instance + isolated DB).
# Replicate this compose per client (separate directory, .env, volumes, domains).
#
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --build
#
# Run from the repository root so the build context includes backend/ and frontend/.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: ./backend
    environment:
      WB_ENVIRONMENT: production
      WB_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      WB_ARGON2_LEVEL: moderate
      WB_SMTP_HOST: ${SMTP_HOST}
      WB_SMTP_PORT: ${SMTP_PORT}
      WB_SMTP_FROM: ${SMTP_FROM}
      WB_CORS_ORIGINS: https://${PUBLIC_DOMAIN},https://${BACKOFFICE_DOMAIN}
      WB_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PYTHONPATH: /app
    # Apply migrations, seed defaults + initial admin, then serve.
    command: sh -c "alembic upgrade head && python scripts/init_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      BACKOFFICE_DOMAIN: ${BACKOFFICE_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: unless-stopped
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  caddy_data:
  caddy_config:
