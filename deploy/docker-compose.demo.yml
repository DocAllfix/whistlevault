# DEMO stack (branch demo-sales): ONE server hosting N neutral isolated tenants
# for sales testing. NOT for production — production uses docker-compose.prod.yml
# on main (one client per stack). Reversible: stop this stack + wipe volumes.
#
#   docker compose -f deploy/docker-compose.demo.yml --env-file deploy/.env.demo up -d --build
#   docker compose -f deploy/docker-compose.demo.yml --env-file deploy/.env.demo \
#     exec api python scripts/provision_demo.py   # creates tenants + prints credentials
#
# Run from the repository root so the build context includes backend/ and frontend/.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ../backend
    environment:
      WB_ENVIRONMENT: production
      WB_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Demo: lighter/faster KDF (64 MiB) so 10+ concurrent logins stay comfortable.
      # No real data at stake. Must match between provisioning and runtime.
      WB_ARGON2_LEVEL: interactive
      WB_SMTP_HOST: ${SMTP_HOST}
      WB_SMTP_PORT: ${SMTP_PORT}
      WB_SMTP_FROM: ${SMTP_FROM}
      WB_SMTP_USERNAME: ${SMTP_USERNAME}
      WB_SMTP_PASSWORD: ${SMTP_PASSWORD}
      WB_RECEIPT_PEPPER: ${RECEIPT_PEPPER}
      # Consumed by scripts/provision_demo.py (run via `exec` after boot).
      WB_DEMO_BASE_DOMAIN: ${DEMO_BASE_DOMAIN}
      WB_DEMO_COUNT: ${DEMO_COUNT}
      PYTHONPATH: /app
      WB_FILES_PATH: /data
    # Apply migrations + seed the inert default tenant. The demo tenants are then
    # created explicitly via `scripts/provision_demo.py` (to capture credentials).
    # H3: --no-access-log so reporter IPs are never written to logs.
    command: sh -c "alembic upgrade head && python scripts/init_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --no-access-log"
    volumes:
      - files_data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: unless-stopped
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  files_data:
  db_data:
  caddy_data:
  caddy_config:
